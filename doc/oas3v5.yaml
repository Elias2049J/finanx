components:
  schemas:
    UserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        lastname:
          type: string
          minLength: 1
        email:
          type: string
          format: email
          minLength: 1
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
        timeZone:
          type: string
          enum:
            - AMERICA_LIMA
            - AMERICA_BOGOTA
            - AMERICA_MEXICO_CITY
            - AMERICA_SANTIAGO
            - AMERICA_BUENOS_AIRES
            - AMERICA_NEW_YORK
            - AMERICA_LOS_ANGELES
      required:
        - email
        - lastname
        - name
        - password
        - timeZone
        - username
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        lastname:
          type: string
        email:
          type: string
        username:
          type: string
        role:
          type: string
          enum:
            - USER
            - SYSTEM
        state:
          type: string
          enum:
            - ENABLED
            - BLOCKED
            - DISABLED
        moneyBalance:
          type: number
        createdAt:
          type: string
          format: date-time
        disabledAt:
          type: string
          format: date-time
        fullName:
          type: string
        timeZone:
          type: string
          enum:
            - AMERICA_LIMA
            - AMERICA_BOGOTA
            - AMERICA_MEXICO_CITY
            - AMERICA_SANTIAGO
            - AMERICA_BUENOS_AIRES
            - AMERICA_NEW_YORK
            - AMERICA_LOS_ANGELES
    TransactionRequest:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        categoryId:
          type: integer
          format: int64
        reasonId:
          type: integer
          format: int64
        description:
          type: string
        amount:
          type: number
          minimum: 0.00
        paymentMethod:
          type: string
          enum:
            - CASH
            - CREDIT_CARD
            - DEBIT_CARD
            - BANK_TRANSFER
            - YAPE
            - PLIN
            - OTHER
        type:
          type: string
          enum:
            - SPENT
            - INCOME
      required:
        - amount
        - categoryId
        - paymentMethod
        - type
        - userId
    TransactionResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        categoryId:
          type: integer
          format: int64
        reasonId:
          type: integer
          format: int64
        amount:
          type: number
        paymentMethod:
          type: string
          enum:
            - CASH
            - CREDIT_CARD
            - DEBIT_CARD
            - BANK_TRANSFER
            - YAPE
            - PLIN
            - OTHER
        type:
          type: string
          enum:
            - SPENT
            - INCOME
        createdAt:
          type: string
          format: date-time
        disabledAt:
          type: string
          format: date-time
        active:
          type: boolean
    BudgetScheduleRequest:
      allOf:
        - $ref: "#/components/schemas/ScheduleRequest"
        - type: object
          properties:
            alertable:
              type: boolean
            percentAlert:
              type: integer
              format: int32
            limitAmount:
              type: number
            description:
              type: string
              minLength: 1
      required:
        - alertable
        - categoryId
        - description
        - limitAmount
        - percentAlert
        - userId
    RecurrenceRuleRequest:
      type: object
      properties:
        recurrenceType:
          type: string
          enum:
            - NONE
            - DAILY
            - WEEKLY
            - MONTHLY
            - YEARLY
        interval:
          type: integer
          format: int32
        dayOfWeek:
          type: string
          enum:
            - MONDAY
            - TUESDAY
            - WEDNESDAY
            - THURSDAY
            - FRIDAY
            - SATURDAY
            - SUNDAY
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
      required:
        - end
        - interval
        - recurrenceType
        - start
    ScheduleRequest:
      type: object
      discriminator:
        propertyName: type
      properties:
        userId:
          type: integer
          format: int64
        categoryId:
          type: integer
          format: int64
        recurrenceRule:
          $ref: "#/components/schemas/RecurrenceRuleRequest"
        type:
          type: string
      required:
        - categoryId
        - type
        - userId
    TransactionScheduleRequest:
      allOf:
        - $ref: "#/components/schemas/ScheduleRequest"
        - type: object
          properties:
            reasonId:
              type: integer
              format: int64
            description:
              type: string
            amount:
              type: number
              minimum: 0.00
            paymentMethod:
              type: string
              enum:
                - CASH
                - CREDIT_CARD
                - DEBIT_CARD
                - BANK_TRANSFER
                - YAPE
                - PLIN
                - OTHER
            transactionType:
              type: string
              enum:
                - SPENT
                - INCOME
      required:
        - amount
        - categoryId
        - paymentMethod
        - transactionType
        - userId
    BudgetScheduleResponse:
      allOf:
        - $ref: "#/components/schemas/ScheduleResponse"
        - type: object
          properties:
            alertable:
              type: boolean
            percentAlert:
              type: integer
              format: int32
            limitAmount:
              type: number
            description:
              type: string
    RecurrenceRuleResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        recurrenceType:
          type: string
          enum:
            - NONE
            - DAILY
            - WEEKLY
            - MONTHLY
            - YEARLY
        interval:
          type: integer
          format: int32
        dayOfWeek:
          type: string
          enum:
            - MONDAY
            - TUESDAY
            - WEDNESDAY
            - THURSDAY
            - FRIDAY
            - SATURDAY
            - SUNDAY
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        durationDays:
          type: integer
          format: int64
    ScheduleResponse:
      type: object
      discriminator:
        propertyName: type
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        categoryId:
          type: integer
          format: int64
        categoryName:
          type: string
        nextRunAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        lastRunAt:
          type: string
          format: date-time
        disabledAt:
          type: string
          format: date-time
        active:
          type: boolean
        state:
          type: string
          enum:
            - RUNNING
            - PAUSED
            - FINALIZED
            - CANCELLED
            - CREATED
            - ERROR
        recurrenceRule:
          $ref: "#/components/schemas/RecurrenceRuleResponse"
        type:
          type: string
      required:
        - type
    TransactionScheduleResponse:
      allOf:
        - $ref: "#/components/schemas/ScheduleResponse"
        - type: object
          properties:
            reasonId:
              type: integer
              format: int64
            reasonDesc:
              type: string
            amount:
              type: number
            paymentMethod:
              type: string
              enum:
                - CASH
                - CREDIT_CARD
                - DEBIT_CARD
                - BANK_TRANSFER
                - YAPE
                - PLIN
